# --------------------------------------------------------------
# LogOutPut.properties
# TransitionGraph関連のログ出力のpropertiesファイル
# (再起動後に有効)
#
# 注意 - ログファイルは出力後、MaxFileSizeMBを超えると
#        TansitionGraph_YYYYMMDD.log.x（x=ファイル番号）へファイルを切り替える
#        ファイルは作成から１週間後に自動的に削除される
# --------------------------------------------------------------

# ログ出力先（環境変数OK）
LogDirectory=%LOCALAPPDATA%\TransitionGraph\logs

# 1ファイル最大サイズ（MB）
MaxFileSizeMB=10

# ログ出力レベル（DEBUG / INFO / WARN / ERROR）
MinLogLevel=DEBUG
